name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: taskai
          POSTGRES_PASSWORD: taskai
          POSTGRES_DB: ai_task_manager_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U taskai"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10
    env:
      PYTEST_RUNNING: "1"
      DATABASE_URL: postgresql://taskai:taskai@localhost:5432/ai_task_manager_test
      TEST_DATABASE_URL: postgresql://taskai:taskai@localhost:5432/ai_task_manager_test
      JWT_ACCESS_SECRET: test-access
      JWT_REFRESH_SECRET: test-refresh
      MISTRAL_API_KEY: test-key
      MISTRAL_MODEL: mistral-small-latest
      AI_DAILY_LIMIT: "100"
      SMS_PROVIDER: console
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install python deps
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Apply database migrations
        working-directory: backend
        run: alembic upgrade head
      - name: Run pytest
        working-directory: backend
        run: pytest -x

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm install --no-audit --no-fund
      - run: npm -w frontend exec tsc -- --noEmit
      - run: npm -w frontend test
      - run: npm -w frontend run build
